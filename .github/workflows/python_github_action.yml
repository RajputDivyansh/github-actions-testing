name: Self Hosted Python CI

on: [push]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v3

    - name: Check Python version
      run: |
        python3.14 --version

    - name: Install dependencies
      run: |
        python3.14 -m pip install --upgrade pip
        pip3.14 install pytest

    - name: Run tests
      run: |
        cd src
        python3.14 -m pytest addition.py
